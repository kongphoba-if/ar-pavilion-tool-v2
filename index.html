<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pavilion SiteView - Deep Debug</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #debug-ui {
            position: fixed; top: 10px; left: 10px; width: 90%;
            z-index: 2000; background: rgba(0,0,0,0.8);
            color: #0f0; padding: 10px; font-family: monospace; font-size: 10px;
        }
        .ui-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; z-index: 1000; background: white; padding: 15px; border-radius: 20px;
        }
        button { width: 100%; padding: 15px; background: #333; color: white; border-radius: 10px; font-weight: bold; }
    </style>
</head>

<body>
    <div id="debug-ui">
        LOG: Initializing...<br>
        <span id="file-status">Files: Checking...</span>
    </div>

    <div class="ui-container">
        <button onclick="recenter()">FORCE RECENTER MODEL</button>
        <p style="font-size: 9px; text-align: center; margin-top: 10px;">
            If you see a RED BOX, the code is working.
        </p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
        embedded renderer="alpha: true; transparent: true;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="m-str" src="str.glb"></a-asset-item>
        </a-assets>

        <a-camera id="cam" position="0 1.6 0" look-controls="enabled: false"></a-camera>

        <a-entity id="anchor" position="0 0 -3">
            
            <a-box id="test-cube" position="0 0.5 0" scale="0.5 0.5 0.5" color="red"></a-box>

            <a-entity id="pavilion" gltf-model="#m-str" scale="1 1 1"></a-entity>
            
        </a-entity>

        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
        const log = document.getElementById('debug-ui');
        const fileStatus = document.getElementById('file-status');
        const anchor = document.getElementById('anchor');
        const model = document.getElementById('m-str');

        // Check if the GLB file actually loads
        model.addEventListener('loaded', () => {
            fileStatus.innerText = "Files: str.glb LOADED SUCCESSFULLY";
            fileStatus.style.color = "#0f0";
        });

        model.addEventListener('error', () => {
            fileStatus.innerText = "FILES: str.glb NOT FOUND (404 Error)";
            fileStatus.style.color = "red";
        });

        function recenter() {
            // Put it 3 meters in front of the phone, regardless of where you are pointing
            anchor.setAttribute('position', '0 0 -3');
            log.innerHTML += "Command: Recenter executed.<br>";
        }
        
        // Auto-recenter after 3 seconds
        setTimeout(recenter, 3000);
    </script>
</body>
</html>
