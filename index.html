<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pavilion SiteView AR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: none; }
        .ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; display: flex; flex-direction: column; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; background: white; font-weight: bold; font-family: sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button.active { background: #333; color: white; }
        .slider-box { background: rgba(255,255,255,0.8); padding: 10px; border-radius: 10px; display: flex; flex-direction: column; }
    </style>
</head>

<body>
    <div class="ui">
        <div class="slider-box">
            <label style="font-size:10px; font-weight:bold; font-family:sans-serif;">GHOSTING</label>
            <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="setOpacity(this.value)">
        </div>
        <div style="display:flex; gap:5px;">
            <button id="btn-str" class="active" onclick="toggle('str')">STR</button>
            <button id="btn-ext" class="active" onclick="toggle('ext')">EXT</button>
            <button id="btn-fur" class="active" onclick="toggle('fur')">FUR</button>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: yes;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true; alpha: true; antialias: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="m-str" src="str.glb"></a-asset-item>
            <a-asset-item id="m-ext" src="ext.glb"></a-asset-item>
            <a-asset-item id="m-fur" src="fur.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="pavilion" scale="4 4 4">
                <a-entity id="str" gltf-model="#m-str" visible="true"></a-entity>
                <a-entity id="ext" gltf-model="#m-ext" visible="true"></a-entity>
                <a-entity id="fur" gltf-model="#m-fur" visible="true"></a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        function toggle(id) {
            const el = document.getElementById(id);
            el.setAttribute('visible', !el.getAttribute('visible'));
            document.getElementById('btn-'+id).classList.toggle('active');
        }

        function setOpacity(val) {
            document.querySelectorAll('[gltf-model]').forEach(m => {
                const mesh = m.getObject3D('mesh');
                if (mesh) {
                    mesh.traverse((node) => {
                        if (node.isMesh) {
                            node.material.transparent = true;
                            node.material.opacity = val;
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
