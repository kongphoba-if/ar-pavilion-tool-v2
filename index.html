<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pavilion AR - Manual Alignment Mode</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        
        /* THE UI PANEL */
        .ui-container {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 94%; z-index: 1000; display: flex; flex-direction: column; gap: 8px;
            background: rgba(255, 255, 255, 0.85); padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); font-family: sans-serif;
        }

        .slider-group { display: flex; flex-direction: column; gap: 2px; }
        label { font-size: 9px; font-weight: bold; color: #333; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: #007bff; margin: 5px 0; }

        .btn-row { display: flex; gap: 4px; margin-top: 5px; }
        button { flex: 1; padding: 12px 5px; border-radius: 8px; border: 1px solid #ccc; background: white; font-weight: bold; font-size: 10px; }
        button.active { background: #333; color: white; border-color: #333; }
        
        /* Force A-Frame canvas to be transparent */
        a-scene, .a-canvas { background-color: transparent !important; }
    </style>
</head>

<body>
    <div class="ui-container">
        <div class="slider-group">
            <label>Manual Rotation (Y-Axis)</label>
            <input type="range" min="0" max="360" value="0" oninput="updateTransform('rotation', this.value)">
        </div>
        <div class="slider-group">
            <label>Manual Zoom / Scale</label>
            <input type="range" min="0.1" max="20" step="0.1" value="4" oninput="updateTransform('scale', this.value)">
        </div>
        <div class="slider-group">
            <label>Model Ghosting (Opacity)</label>
            <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="setOpacity(this.value)">
        </div>

        <div class="btn-row">
            <button id="btn-str" class="active" onclick="toggleLayer('str')">STRUCTURE</button>
            <button id="btn-ext" class="active" onclick="toggleLayer('ext')">EXTERIOR</button>
            <button id="btn-fur" class="active" onclick="toggleLayer('fur')">FURNITURE</button>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true; alpha: true; transparent: true;" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="m-str" src="str.glb"></a-asset-item>
            <a-asset-item id="m-ext" src="ext.glb"></a-asset-item>
            <a-asset-item id="m-fur" src="fur.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-camera>

        <a-entity id="pavilion-anchor" position="0 0 -5" rotation="0 0 0" scale="4 4 4">
            <a-entity id="str" gltf-model="#m-str"></a-entity>
            <a-entity id="ext" gltf-model="#m-ext"></a-entity>
            <a-entity id="fur" gltf-model="#m-fur"></a-entity>
        </a-entity>

        <a-light type="directional" position="1 2 1" intensity="1"></a-light>
        <a-light type="ambient" intensity="0.5"></a-light>
    </a-scene>

    <script>
        const anchor = document.getElementById('pavilion-anchor');

        // MANUAL ALIGNMENT LOGIC
        function updateTransform(type, val) {
            if (type === 'rotation') {
                anchor.setAttribute('rotation', `0 ${val} 0`);
            } else if (type === 'scale') {
                anchor.setAttribute('scale', `${val} ${val} ${val}`);
            }
        }

        // VISIBILITY LOGIC
        function toggleLayer(id) {
            const el = document.getElementById(id);
            const isVisible = el.getAttribute('visible');
            el.setAttribute('visible', !isVisible);
            document.getElementById('btn-' + id).classList.toggle('active');
        }

        // OPACITY LOGIC
        function setOpacity(val) {
            document.querySelectorAll('[gltf-model]').forEach(m => {
                const mesh = m.getObject3D('mesh');
                if (mesh) {
                    mesh.traverse((node) => {
                        if (node.isMesh) {
                            node.material.transparent = true;
                            node.material.opacity = val;
                        }
                    });
                }
            });
        }
        
        // Ensure transparency works after models load
        document.querySelectorAll('[gltf-model]').forEach(m => {
            m.addEventListener('model-loaded', () => setOpacity(document.querySelector('input[min="0.1"]').value));
        });
    </script>
</body>
</html>
