<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pavilion AR - Force Start</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* UI is hidden until camera starts */
        #ui-overlay { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; width: 90%; display: none; flex-direction: column; gap: 10px; 
        }
        
        .control-btn { padding: 15px; border-radius: 10px; border: none; background: white; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* The "Emergency" start button if auto-start fails */
        #manual-start {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; padding: 25px 40px; background: #007bff; color: white;
            border: none; border-radius: 50px; font-weight: bold; font-size: 18px;
        }
    </style>
</head>

<body>
    <button id="manual-start" onclick="startAR()">ACTIVATE AR VIEW</button>

    <div id="ui-overlay">
        <button class="control-btn" onclick="updateOpacity(0.5)">GHOST MODE (50%)</button>
        <button class="control-btn" onclick="updateOpacity(1.0)">SOLID MODE (100%)</button>
    </div>

    <a-scene 
        id="scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true; alpha: true;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="m-str" src="str.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#m-str" scale="4 4 4" id="target-model"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const startBtn = document.querySelector('#manual-start');
        const uiOverlay = document.querySelector('#ui-overlay');

        function startAR() {
            // 1. Manually trigger the MindAR start sequence
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 

            // 2. Hide the button and show the UI
            startBtn.style.display = 'none';
            uiOverlay.style.display = 'flex';
            
            console.log("AR System Started Manually");
        }

        function updateOpacity(val) {
            const model = document.querySelector('#target-model');
            const mesh = model.getObject3D('mesh');
            if (mesh) {
                mesh.traverse((node) => {
                    if (node.isMesh) {
                        node.material.transparent = true;
                        node.material.opacity = val;
                    }
                });
            }
        }

        // Auto-fix for S24 Ultra orientation/camera bugs
        window.addEventListener('resize', () => {
            sceneEl.resize();
        });
    </script>
</body>
</html>
