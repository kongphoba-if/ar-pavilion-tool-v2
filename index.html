<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pavilion SiteView - Stability Pro</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #video-feed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .a-canvas { z-index: 10 !important; }

        .ui-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; z-index: 100; background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 20px; font-family: sans-serif;
            pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-row { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 15px 5px; border-radius: 10px; border: none; background: #333; color: white; font-weight: bold; font-size: 11px; }
        button.active { background: #007bff; }
        .hint { font-size: 8px; text-align: center; margin-top: 8px; color: #888; }
    </style>
</head>

<body>
    <video id="video-feed" autoplay playsinline muted></video>

    <div class="ui-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="font-size:10px; font-weight:bold;">MODEL GHOSTING</label>
            <button onclick="recenter()" style="flex:none; width:80px; padding:5px; background:#007bff; font-size:9px;">RE-CENTER</button>
        </div>
        <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="setOpacity(this.value)" style="width:100%; margin:10px 0;">
        
        <div class="btn-row">
            <button id="btn-str" class="active" onclick="toggle('str')">STRUCTURE</button>
            <button id="btn-ext" class="active" onclick="toggle('ext')|">EXTERIOR</button>
            <button id="btn-fur" class="active" onclick="toggle('fur')">FURNITURE</button>
        </div>
        <div class="hint">1 FINGER: ROTATE | 2 FINGERS: PAN & SCALE</div>
    </div>

    <a-scene embedded renderer="alpha: true; antialias: false; precision: medium;" vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="m-str" src="str.glb"></a-asset-item>
            <a-asset-item id="m-ext" src="ext.glb"></a-asset-item>
            <a-asset-item id="m-fur" src="fur.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>

        <a-entity id="pavilion-anchor" position="0 0 -5" rotation="0 0 0" scale="1 1 1">
            <a-entity id="str" gltf-model="#m-str"></a-entity>
            <a-entity id="ext" gltf-model="#m-ext"></a-entity>
            <a-entity id="fur" gltf-model="#m-fur"></a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
        // Use requestAnimationFrame to prevent GPU overload
        let ticking = false;
        const video = document.getElementById('video-feed');
        const anchor = document.getElementById('pavilion-anchor');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; });

        let iScale = 1, iRot = 0, iPos = {x:0, y:0};
        let tDist = 0, tX = 0, tMid = {x:0, y:0};

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                tX = e.touches[0].pageX;
                iRot = anchor.getAttribute('rotation').y;
            } else if (e.touches.length === 2) {
                tDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                iScale = anchor.getAttribute('scale').x;
                tMid = { x: (e.touches[0].pageX + e.touches[1].pageX)/2, y: (e.touches[0].pageY + e.touches[1].pageY)/2 };
                iPos = { x: anchor.getAttribute('position').x, y: anchor.getAttribute('position').y };
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateGestures(e);
                    ticking = false;
                });
                ticking = true;
            }
        });

        function updateGestures(e) {
            if (e.touches.length === 1) {
                let dx = e.touches[0].pageX - tX;
                anchor.setAttribute('rotation', `0 ${iRot + dx * 0.4} 0`);
            } else if (e.touches.length === 2) {
                let curDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                let sFactor = curDist / tDist;
                let nS = iScale * sFactor;
                anchor.setAttribute('scale', `${nS} ${nS} ${nS}`);

                let curMid = { x: (e.touches[0].pageX + e.touches[1].pageX)/2, y: (e.touches[0].pageY + e.touches[1].pageY)/2 };
                let dx = (curMid.x - tMid.x) * 0.01;
                let dy = (curMid.y - tMid.y) * 0.01;
                anchor.setAttribute('position', `${iPos.x + dx} ${iPos.y - dy} -5`);
            }
        }

        function recenter() { anchor.setAttribute('position', '0 0 -5'); anchor.setAttribute('scale', '1 1 1'); }
        function toggle(id) {
            const el = document.getElementById(id);
            el.setAttribute('visible', !el.getAttribute('visible'));
            document.getElementById('btn-' + id).classList.toggle('active');
        }
        function setOpacity(v) {
            document.querySelectorAll('[gltf-model]').forEach(m => {
                const mesh = m.getObject3D('mesh');
                if (mesh) mesh.traverse((n) => { if (n.isMesh) { n.material.transparent = true; n.material.opacity = v; } });
            });
        }
    </script>
</body>
</html>
