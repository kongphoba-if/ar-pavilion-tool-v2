<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pavilion SiteView - RECOVERY</title>
    
    <script src="https://unpkg.com/aframe@1.5.0/dist/aframe-master.min.js"></script>
    <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            padding: 25px 50px; background: #007bff; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
        }
        #status { margin-top: 20px; color: #0f0; font-size: 12px; text-align: center; padding: 0 20px; }
    </style>
</head>

<body>
    <div id="overlay">
        <button id="startBtn" class="btn">START AR CAMERA</button>
        <div id="status">Waking up AR engine...</div>
    </div>

    <a-scene 
        id="scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" 
        embedded color-space="sRGB" renderer="alpha: true; antialias: true;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="model" src="str.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity gltf-model="#model" scale="4 4 4"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const sceneEl = document.querySelector('a-scene');

        // 1. WATCH THE HANDSHAKE
        const checkEngine = setInterval(() => {
            if (typeof AFRAME !== 'undefined' && sceneEl.systems['mindar-image-system']) {
                status.innerText = "ENGINE READY. TAP BUTTON.";
                status.style.color = "#0f0";
                clearInterval(checkEngine);
            } else {
                status.innerText = "Waiting for MindAR to attach to A-Frame...";
                status.style.color = "#ff0";
            }
        }, 500);

        // 2. FORCE THE CAMERA
        startBtn.addEventListener('click', async () => {
            status.innerText = "Requesting Lens Access...";
            
            try {
                const arSystem = sceneEl.systems["mindar-image-system"];
                if (!arSystem) throw new Error("MindAR Plugin didn't load.");

                await arSystem.start();
                overlay.style.display = 'none'; // Hide overlay on success
            } catch (err) {
                status.innerText = "ERROR: " + err.message + "\nTry opening in Samsung Internet Browser.";
                status.style.color = "red";
                console.error(err);
            }
        });
    </script>
</body>
</html>
